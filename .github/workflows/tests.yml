name: tests
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - run: docker compose up -d --build

      - name: Wait for Pagila to finish loading
        run: |
          for i in {1..60}; do
            docker compose exec -T pg psql -U postgres -d postgres -c "SELECT 1 FROM actor LIMIT 1;" >/dev/null 2>&1 && exit 0
            sleep 2
          done
          docker compose logs pg
          exit 1

      - run: docker compose exec -T pg ./run_tests.sh
